<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* DARK (default) - refined navy + indigo */
:root,
[data-theme="dark"]{
  --bg:#0b0f1a;
  --bg-soft:#10162a;
  --bg-elev:#161d35;
  --bg-card:#171e38;
  --line:rgba(255,255,255,.06);
  --line-2:rgba(255,255,255,.12);
  --ink:#eef1f8;
  --ink-2:#b4bbcf;
  --ink-3:#737c93;
  --accent:#6366f1;
  --accent-2:#8b8ef5;
  --accent-soft:rgba(99,102,241,.12);
  --accent-border:rgba(99,102,241,.28);
  --status:#22c55e;
  --grad:linear-gradient(135deg,#6366f1 0%,#818cf8 50%,#a5b4fc 100%);
  --grad-soft:linear-gradient(135deg,rgba(99,102,241,.10),rgba(165,180,252,.10));
  --bg-radial-1:radial-gradient(900px 700px at 88% -10%,rgba(99,102,241,.10),transparent 60%);
  --bg-radial-2:radial-gradient(800px 600px at -5% 110%,rgba(99,102,241,.06),transparent 60%);
  --portrait-bg:linear-gradient(160deg,#1a2244 0%,#0b0f1a 100%);
  --portrait-glow-1:rgba(99,102,241,.16);
  --portrait-glow-2:rgba(139,142,245,.10);
  --proj-visual-bg:linear-gradient(160deg,#1a2244,#0b0f1a);
  --curtain-bg:linear-gradient(180deg,#0b0f1a 0%,#0d1226 100%);
  --shadow-sm:0 8px 22px rgba(99,102,241,.18);
  --shadow-md:0 30px 70px -30px rgba(0,0,0,.7);
}
[data-theme="light"]{
  --bg:#fafaf7;
  --bg-soft:#f3f3ee;
  --bg-elev:#ffffff;
  --bg-card:#ffffff;
  --line:rgba(15,23,42,.07);
  --line-2:rgba(15,23,42,.13);
  --ink:#0f172a;
  --ink-2:#475569;
  --ink-3:#94a3b8;
  --accent:#4f46e5;
  --accent-2:#6366f1;
  --accent-soft:rgba(79,70,229,.08);
  --accent-border:rgba(79,70,229,.22);
  --status:#16a34a;
  --grad:linear-gradient(135deg,#4f46e5 0%,#6366f1 50%,#818cf8 100%);
  --grad-soft:linear-gradient(135deg,rgba(79,70,229,.08),rgba(129,140,248,.08));
  --bg-radial-1:radial-gradient(900px 700px at 88% -10%,rgba(79,70,229,.06),transparent 60%);
  --bg-radial-2:radial-gradient(800px 600px at -5% 110%,rgba(99,102,241,.04),transparent 60%);
  --portrait-bg:linear-gradient(160deg,#eef2ff 0%,#e0e7ff 100%);
  --portrait-glow-1:rgba(79,70,229,.10);
  --portrait-glow-2:rgba(99,102,241,.08);
  --proj-visual-bg:linear-gradient(160deg,#eef2ff,#f8fafc);
  --curtain-bg:linear-gradient(180deg,#fafaf7 0%,#eef2ff 100%);
  --shadow-sm:0 8px 22px rgba(79,70,229,.12);
  --shadow-md:0 30px 60px -30px rgba(15,23,42,.18);
}

:root{
  --radius-sm:10px;
  --radius:16px;
  --radius-lg:24px;
  --radius-xl:36px;
  --pad-x:clamp(20px,4vw,72px);
  --section-y:clamp(80px,9vw,140px);
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-soft:cubic-bezier(.4,0,.2,1);
}
html{
  background:var(--bg);
  color:var(--ink);
  font-family:'Kanit',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  font-size:16px;
  line-height:1.5;
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  scroll-behavior:smooth;
  text-rendering:optimizeLegibility;
  transition:background .35s var(--ease-out),color .35s var(--ease-out);
}
body{
  min-height:100vh;
  overflow-x:hidden;
  background:transparent;
  transition:background .35s var(--ease-out);
}
html{background:var(--bg);transition:background .35s var(--ease-out)}
img,svg{display:block;max-width:100%}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:#fff}

h1,h2,h3,h4{font-family:'Kanit',sans-serif;font-weight:700;letter-spacing:-.025em;line-height:1}
.muted{color:var(--ink-3)}

.container{
  width:100%;max-width:1320px;margin:0 auto;
  padding-left:var(--pad-x);padding-right:var(--pad-x);
}
.section{padding-top:var(--section-y);padding-bottom:var(--section-y)}

.progress{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:var(--grad);
  transform-origin:0 50%;transform:scaleX(0);
  z-index:100;pointer-events:none;will-change:transform;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--accent-border)}

/* Nav */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:18px var(--pad-x);
  background:color-mix(in srgb,var(--bg) 70%,transparent);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border-bottom:1px solid var(--line);
  transition:padding .3s var(--ease-out),background .35s var(--ease-out),border-color .35s var(--ease-out);
}
.nav.shrunk{padding:12px var(--pad-x)}
.nav .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.01em}
.nav .logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:var(--grad);display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:13px;
  box-shadow:var(--shadow-sm);
}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{
  padding:8px 14px;border-radius:9px;
  font-size:14px;font-weight:500;color:var(--ink-2);
  transition:color .2s,background .2s;
}
.nav-links a:hover{color:var(--ink);background:var(--accent-soft)}
.nav-links a.active{color:var(--ink);background:var(--accent-soft)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-cta{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:999px;
  background:color-mix(in srgb,var(--status) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--status) 35%,transparent);
  color:var(--status);font-weight:500;font-size:13px;
  transition:transform .2s var(--ease-out),background .2s;
}
.nav-cta:hover{transform:translateY(-1px);background:color-mix(in srgb,var(--status) 18%,transparent)}
.nav-cta .dot{width:7px;height:7px;border-radius:50%;background:var(--status);box-shadow:0 0 10px color-mix(in srgb,var(--status) 70%,transparent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* Theme toggle */
.theme-toggle{
  width:38px;height:38px;border-radius:10px;
  display:grid;place-items:center;
  background:var(--accent-soft);
  border:1px solid var(--line-2);
  color:var(--ink);
  transition:background .2s,border-color .2s,transform .2s var(--ease-out);
  position:relative;
}
.theme-toggle:hover{background:var(--accent-soft);border-color:var(--accent-border);transform:translateY(-1px)}
.theme-toggle svg{width:18px;height:18px;transition:opacity .25s var(--ease-out),transform .35s var(--ease-out)}
.theme-toggle .icon-sun{position:absolute;opacity:0;transform:rotate(-45deg) scale(.6)}
.theme-toggle .icon-moon{opacity:1;transform:rotate(0) scale(1)}
[data-theme="light"] .theme-toggle .icon-moon{opacity:0;transform:rotate(45deg) scale(.6)}
[data-theme="light"] .theme-toggle .icon-sun{opacity:1;transform:rotate(0) scale(1)}

@media (max-width:760px){.nav-links{display:none}}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 24px;border-radius:999px;
  font-family:'Kanit',sans-serif;font-weight:600;font-size:15px;
  transition:transform .25s var(--ease-out),box-shadow .25s,background .2s,border-color .2s;
  cursor:pointer;will-change:transform;
}
.btn-primary{background:var(--grad);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 36px color-mix(in srgb,var(--accent) 35%,transparent)}
.btn-ghost{background:var(--accent-soft);color:var(--ink);border:1px solid var(--line-2)}
.btn-ghost:hover{border-color:var(--accent-border);background:var(--accent-soft)}
.btn .arr{transition:transform .25s var(--ease-out)}
.btn:hover .arr{transform:translateX(3px)}

/* Eyebrow */
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:999px;
  background:var(--accent-soft);
  border:1px solid var(--accent-border);
  color:var(--accent);
  font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Reveal */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .8s var(--ease-out),transform .8s var(--ease-out)}
.reveal.in{opacity:1;transform:none}
.reveal-stagger > *{opacity:0;transform:translateY(20px);transition:opacity .7s var(--ease-out),transform .7s var(--ease-out)}
.reveal-stagger.in > *{opacity:1;transform:none}
.reveal-stagger.in > *:nth-child(1){transition-delay:.05s}
.reveal-stagger.in > *:nth-child(2){transition-delay:.1s}
.reveal-stagger.in > *:nth-child(3){transition-delay:.15s}
.reveal-stagger.in > *:nth-child(4){transition-delay:.2s}
.reveal-stagger.in > *:nth-child(5){transition-delay:.25s}
.reveal-stagger.in > *:nth-child(6){transition-delay:.3s}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
  .reveal,.reveal-stagger > *{opacity:1!important;transform:none!important}
}
</style>

/* CURTAIN */

}

.curtain.in .strip:nth-child(3){transition-delay:.08s}
.curtain.in .strip:nth-child(4){transition-delay:.12s}
.curtain.in .strip:nth-child(5){transition-delay:.16s}

/* ==== Scrolling animated background ==== */
.bg-fx{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  overflow:hidden;
  isolation:isolate;
  background:var(--bg-radial-1),var(--bg-radial-2),var(--bg);
}
.bg-fx::before{
  /* Subtle dot grid that drifts */
  content:"";
  position:absolute;
  inset:-10%;
  background-image:
    radial-gradient(circle at center,var(--bg-dot,rgba(255,255,255,.07)) 1px,transparent 1.5px);
  background-size:32px 32px;
  background-position:0 0;
  opacity:.55;
  transform:translate3d(0,0,0);
  will-change:transform,opacity;
  mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000 40%,transparent 90%);
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000 40%,transparent 90%);
}
.bg-fx::after{
  /* Faint grain to add texture */
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg,transparent 0%,var(--bg-veil,rgba(0,0,0,.18)) 100%);
  mix-blend-mode:multiply;
  opacity:.7;
}
[data-theme="light"] .bg-fx::after{
  background:linear-gradient(180deg,transparent 0%,var(--bg-veil,rgba(20,20,40,.05)) 100%);
  mix-blend-mode:normal;
}
[data-theme="light"] .bg-fx::before{
  --bg-dot:rgba(60,60,120,.10);
}

.bg-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  filter:saturate(1.05);
}

/* Decorative blurred gradient orbs (CSS fallback + always-on layer) */
.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(70px);
  opacity:.55;
  will-change:transform;
  transform:translate3d(0,0,0);
  pointer-events:none;
}

}

  left:8vw;top:62vh;
  background:radial-gradient(circle at 50% 50%,var(--orb-3,#a5b4fc) 0%,transparent 65%);
  opacity:.32;
}
.bg-orb.o4{
  width:30vw;height:30vw;

[data-theme="dark"] .bg-fx{

  --orb-2:#818cf8;
  --orb-3:#4f46e5;
  --orb-4:#a5b4fc;
}
[data-theme="light"] .bg-fx{

  --orb-2:#c7d2fe;

[data-theme="light"] .bg-orb{opacity:.42;filter:blur(80px)}
[data-theme="light"] .bg-orb.o3{opacity:.28}

/* Soft scanline / aurora overlay that drifts with scroll */
.bg-aurora{
  position:absolute;
  inset:-20% -10%;
  background:
    conic-gradient(from var(--aur-angle,180deg) at 50% 50%,
      transparent 0deg,
      var(--aur-1,rgba(99,102,241,.18)) 60deg,
      transparent 120deg,
      var(--aur-2,rgba(129,140,248,.15)) 200deg,
      transparent 260deg,
      var(--aur-3,rgba(79,70,229,.16)) 320deg,
      transparent 360deg);
  filter:blur(60px);
  opacity:.55;
  mix-blend-mode:screen;
  transform:translate3d(0,var(--aur-y,0px),0) rotate(var(--aur-rot,0deg));
  will-change:transform;
}
[data-theme="light"] .bg-aurora{
  --aur-1:rgba(99,102,241,.10);
  --aur-2:rgba(165,180,252,.10);
  --aur-3:rgba(79,70,229,.08);
  mix-blend-mode:multiply;
  opacity:.5;
}

/* Vignette so content always reads cleanly */
.bg-vignette{

  pointer-events:none;
}

@media (prefers-reduced-motion:reduce){

/* ===== v14 unique scroll animations ===== */

/* Split-text word reveal — used for h1/h2 */
.split-words{display:inline-block}
.split-words .w{
  display:inline-block;
  opacity:0;
  transform:translateY(.45em) rotate(4deg) scale(.96);
  transition:opacity .7s var(--ease-out),transform .7s var(--ease-out);
  transition-delay:calc(var(--i,0) * 60ms);
  transform-origin:0 100%;
  white-space:pre;
}
.split-words.in .w{
  opacity:1;
  transform:translateY(0) rotate(0) scale(1);
}

/* Char shimmer — used for hero h1 */
.split-chars .ch{
  display:inline-block;
  opacity:0;
  transform:translateY(.6em);
  transition:opacity .55s var(--ease-out),transform .55s var(--ease-out);
  transition-delay:calc(var(--i,0) * 22ms);
  white-space:pre;
}
.split-chars.in .ch{opacity:1;transform:translateY(0)}

/* Stat counter card — lifts and scales as it enters viewport */
.stat-tile{
  position:relative;
  transform:translateY(40px) scale(.96);
  opacity:0;
  transition:opacity .8s var(--ease-out),transform .8s var(--ease-out);
}
.stat-tile.in{opacity:1;transform:translateY(0) scale(1)}
.stat-tile::after{
  content:"";
  position:absolute;inset:0;
  border-radius:inherit;
  background:linear-gradient(120deg,transparent 30%,color-mix(in srgb,var(--accent) 18%,transparent) 50%,transparent 70%);
  transform:translateX(-120%);
  pointer-events:none;
  mix-blend-mode:plus-lighter;
  opacity:0;
}
.stat-tile.in::after{
  animation:tileShimmer 1.6s ease-out .35s 1 forwards;
}
@keyframes tileShimmer{
  0%{transform:translateX(-120%);opacity:0}
  20%{opacity:1}
  100%{transform:translateX(120%);opacity:0}
}

/* Service cards fan-out — alternate direction by index */
.fan-card{
  opacity:0;
  transform:translateY(50px) rotate(var(--rot,-2deg)) scale(.94);
  transition:opacity .85s var(--ease-out),transform .85s var(--ease-out);
  transition-delay:calc(var(--i,0) * 90ms);
  transform-origin:50% 100%;
}
.fan-card.in{opacity:1;transform:translateY(0) rotate(0) scale(1)}

/* Section title underline draw — used on h2 */
.title-draw{position:relative;display:inline-block;padding-bottom:8px}
.title-draw::after{
  content:"";
  position:absolute;left:0;bottom:0;
  height:3px;width:0%;
  background:var(--grad);
  border-radius:2px;
  transition:width 1.1s cubic-bezier(.65,.05,.36,1) .25s;
}
.title-draw.in::after{width:60%}

/* Float-in from sides for marquee container */
.marquee-wrap.reveal-side{
  opacity:0;transform:translateY(20px) scaleX(.97);
  transition:opacity .9s var(--ease-out),transform .9s var(--ease-out);
}
.marquee-wrap.reveal-side.in{opacity:1;transform:none}

/* Contact card reveal — slide from left/right alternating */
.contact-card{
  opacity:0;
  transform:translateX(var(--from,40px));
  transition:opacity .8s var(--ease-out),transform .8s var(--ease-out);
  transition-delay:calc(var(--i,0) * 110ms);
  position:relative;
  overflow:hidden;
}
.contact-card.in{opacity:1;transform:translateX(0)}
.contact-card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(115deg,transparent 30%,color-mix(in srgb,var(--accent) 35%,transparent) 50%,transparent 70%);
  transform:translateX(-110%);
  pointer-events:none;
  border-radius:inherit;
  z-index:0;
}
.contact-card.in::before{
  animation:contactSweep 1.8s ease-out .5s 1 forwards;
}
@keyframes contactSweep{
  0%{transform:translateX(-110%)}
  60%{transform:translateX(110%)}
  100%{transform:translateX(110%)}
}
.contact-card > *{position:relative;z-index:1}

/* Magnetic hover lift on cards */
.lift-card{
  transition:transform .35s var(--ease-out),box-shadow .35s var(--ease-out),border-color .35s var(--ease-out);
}
.lift-card:hover{
  transform:translateY(-4px);
  border-color:var(--accent-border);
}

/* Scroll progress floating dot beside section titles */
.section-tag{
  position:relative;
  display:inline-flex;align-items:center;gap:8px;
}

/* Number counter base */
.count-up{display:inline-block;font-variant-numeric:tabular-nums}

/* Floating cards on scroll — used for status pills */
.float-y{
  animation:floatY 4.5s ease-in-out infinite alternate;
}
@keyframes floatY{
  from{transform:translateY(0)}
  to{transform:translateY(-6px)}
}


/* Enhanced hover on service-card */
.service-card{
  transition:transform .4s var(--ease-out),border-color .4s var(--ease-out),background .4s var(--ease-out);
}
.service-card:hover{
  transform:translateY(-6px) scale(1.01);
  border-color:var(--accent-border);
}

}

@media (prefers-reduced-motion:reduce){
  .split-words .w,.split-chars .ch,.stat-tile,.fan-card,.contact-card,.marquee-wrap.reveal-side,.title-draw::after,.float-y{
    transition:none!important;
    animation:none!important;
    transform:none!important;
    opacity:1!important;
    width:60%!important;
  }
}


/* ===== v15 interactive bg + page animations ===== */


.bg-ripples{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.bg-ripples .ripple{
  position:absolute;
  width:8px;height:8px;
  border-radius:50%;
  border:1.5px solid color-mix(in srgb,var(--accent) 70%,transparent);
  transform:translate3d(-50%,-50%,0);
  pointer-events:none;
  animation:rippleOut 1.4s cubic-bezier(.22,.61,.36,1) 1 forwards;
  mix-blend-mode:screen;

(function(){

  var aurora = document.getElementById('bgAurora');

    document.getElementById('bgOrb2'),

  ];

  var targetScroll = scrollY;
  var smoothScroll = scrollY;
  var mouseX = 0, mouseY = 0;
  var hasMoved = false;

  function getThemeColors(){
    var theme = document.documentElement.getAttribute('data-theme') || 'dark';
    if(theme === 'light'){
      return {
        dot: 'rgba(79, 70, 229, 0.55)',
        line: 'rgba(99, 102, 241, 0.18)',
        glow: 'rgba(129, 140, 248, 0.35)'
      };
    }
    return {
      dot: 'rgba(165, 180, 252, 0.85)',
      line: 'rgba(129, 140, 248, 0.22)',
      glow: 'rgba(99, 102, 241, 0.45)'
    };
  }

    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    initParticles();
  }

  function initParticles(){
    var area = W * H;
    var density = Math.min(80, Math.max(28, Math.floor(area / 22000)));
    if(prefersReduce) density = 0;
    particles = [];
    for(var i=0; i<density; i++){
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,

    var scrollOffset = (smoothScroll * 0.05) % H;

    // Update and draw particles

      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      // Wrap around edges
      if(p.x < -10) p.x = W + 10;
      else if(p.x > W + 10) p.x = -10;
      if(p.y < -10) p.y = H + 10;
      else if(p.y > H + 10) p.y = -10;

    }

    rafId = requestAnimationFrame(step);
  }

  var rafId = 0;
  function start(){ if(!rafId) rafId = requestAnimationFrame(step); }
  function stop(){ if(rafId){ cancelAnimationFrame(rafId); rafId = 0; } }

<script>

(function(){

  function splitText(el, mode){
    if(!el || el.dataset.split === '1') return;
    var orig = el.textContent;
    el.dataset.split = '1';
    el.dataset.origText = orig;
    el.innerHTML = '';
    if(mode === 'chars'){
      var chars = orig.split('');
      el.classList.add('split-chars');
      chars.forEach(function(c, i){
        var span = document.createElement('span');
        span.className = 'ch';
        span.style.setProperty('--i', i);
        span.textContent = c === ' ' ? '\u00a0' : c;
        el.appendChild(span);
      });
    } else {
      var words = orig.split(/(\s+)/);
      el.classList.add('split-words');
      var idx = 0;
      words.forEach(function(w){
        if(/^\s+$/.test(w)){
          el.appendChild(document.createTextNode(w));
        } else if(w.length){
          var span = document.createElement('span');
          span.className = 'w';
          span.style.setProperty('--i', idx++);
          span.textContent = w;
          el.appendChild(span);
        }
      });

  }

  /* Apply split-text to all hero h1 segments and section h2's */
  function applySplits(){

    var suffix = el.dataset.suffix || (el.textContent.match(/[^0-9.]+$/) ? el.textContent.match(/[^0-9.]+$/)[0] : '');

      el.textContent = prefix + formatted + suffix;

    statTiles.forEach(function(s, i){
      s.classList.add('stat-tile');
      s.style.setProperty('--i', i);
    });

    // Tag service cards as fan
    var serviceCards = document.querySelectorAll('.service-card');
    serviceCards.forEach(function(c, i){
      c.classList.add('fan-card');
      c.style.setProperty('--i', i);
      c.style.setProperty('--rot', (i % 2 === 0 ? -2 : 2) + 'deg');
    });

    // Tag contact cards alternating direction
    var contactCards = document.querySelectorAll('.contact-grid > a,.contact-grid > .card,.contact .contact-card-list > *');
    contactCards.forEach(function(c, i){
      c.classList.add('contact-card');
      c.classList.add('lift-card');
      c.style.setProperty('--i', i);
      c.style.setProperty('--from', (i % 2 === 0 ? '40px' : '-40px'));
    });

    // Mark h2 underlines
    document.querySelectorAll('section h2').forEach(function(h2){
      // Only direct draw — wrap content in title-draw if not already
      if(!h2.querySelector('.title-draw')){
        var wrap = document.createElement('span');
        wrap.className = 'title-draw';
        while(h2.firstChild) wrap.appendChild(h2.firstChild);
        h2.appendChild(wrap);
      }
    });

    // Marquee fade-in
    document.querySelectorAll('.marquee,.marquee-wrap').forEach(function(m){
      m.classList.add('marquee-wrap','reveal-side');
    });

    // Set up IntersectionObserver
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          var el = entry.target;
          el.classList.add('in');
          // For split-chars/words add 'in' to the parent
          if(el.classList.contains('split-chars') || el.classList.contains('split-words')){
            // already 'in' added
          }
          // For stat tiles, fire counter
          if(el.classList.contains('stat-tile')){
            var n = el.querySelector('.count-up,.num,strong,.stat-num');
            if(n && !n.dataset.counted){
              n.dataset.counted = '1';
              animateCounter(n);
            }
          }
          io.unobserve(el);
        }
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });

    // Observe all targets
    document.querySelectorAll('.split-chars,.split-words,.stat-tile,.fan-card,.contact-card,.title-draw,.marquee-wrap.reveal-side').forEach(function(el){
      io.observe(el);
    });

    // (hero auto-trigger removed; hero stays as-is)
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Re-init on hashchange (for SPA route changes)
  var lastHash = location.hash;
  window.addEventListener('hashchange', function(){
    if(location.hash !== lastHash){
      lastHash = location.hash;
      setTimeout(init, 200);
    }
  });
})();
</script>
<script>
/* === v15 interactive bg + per-page animations === */
(function(){
  var prefersReduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ========= Cursor halo & ripples ========= */

  var ripples = document.getElementById('bgRipples');
  var fx = document.getElementById('bgFx');


  /* Click-anywhere ripple */
  if(ripples && !prefersReduce){
    document.addEventListener('click', function(e){
      // Skip if clicking on interactive controls — feels weird otherwise
      if(e.target.closest('a,button,input,textarea,select,[role="button"]')) return;
      var r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = e.clientX + 'px';
      r.style.top = e.clientY + 'px';
      ripples.appendChild(r);
      setTimeout(function(){ if(r.parentNode) r.parentNode.removeChild(r); }, 1500);
    }, { passive: true });
  }

  /* Boost canvas particle interaction (stronger pull + repel) */
  /* The base particle simulation already uses mouse position; we just amplify by   */
  /* setting CSS variable that the canvas script reads is overkill. Instead, expose */
  /* mouseX/Y on window and the existing canvas reads window mouse via its handler. */

  /* ========= Per-page animation orchestrator ========= */
  function tagAndObserve(){
    if(prefersReduce) return;

    // ABOUT page: skill chips pop, paragraphs blur-in
    var about = document.querySelector('#page-about-mount,.about,#/about,[data-page="about"]');
    var aboutSection = document.querySelector('main section.about,main .about-section,main .about-grid');
    // simpler: find by current hash
    var hash = location.hash || '#/';

    document.querySelectorAll('main .chip,main .badge,main .pill,main .tag-pill').forEach(function(c, i){
      if(!c.classList.contains('pop-in')){
        c.classList.add('pop-in');
        c.style.setProperty('--i', i);
      }
    });

    // WORK page: project rows flip up
    document.querySelectorAll('main .project,main .project-card,main .work-card,.proj-card,.proj-row').forEach(function(c, i){
      if(!c.classList.contains('flip-up')){
        c.classList.add('flip-up','tilt-card');
        c.style.setProperty('--i', i);
      }
    });

    // EXPERIENCE page: timeline rows slide alternating
    document.querySelectorAll('main .timeline-item,main .exp-item,main .experience-item,.timeline > *,.exp-row').forEach(function(c, i){
      if(!c.classList.contains('timeline-row')){
        c.classList.add('timeline-row');
        c.style.setProperty('--i', i);
        c.style.setProperty('--from', (i % 2 === 0 ? '60px' : '-60px'));
      }
    });

    // Timeline rail (the parent) — draw line
    document.querySelectorAll('main .timeline,main .exp-list,.timeline-rail').forEach(function(c){
      if(!c.classList.contains('timeline-rail')) c.classList.add('timeline-rail');
    });

    // Generic: section paragraphs / container children get blur-in (fallback)
    document.querySelectorAll('main section p,main section h3,main section li,main section blockquote').forEach(function(c, i){
      if(!c.classList.contains('blur-in') && !c.classList.contains('split-words') && !c.classList.contains('split-chars')){
        c.classList.add('blur-in');
        c.style.setProperty('--i', Math.min(i, 8));
      }
    });

    // Glow border on testimonial cards
    document.querySelectorAll('main .testimonial,main .quote,main blockquote,main .review-card').forEach(function(c){
      c.classList.add('glow-border');
    });

    // Magnet-btn for any anchor button inside main
    document.querySelectorAll('main .btn,main .button,main a.cta,main a[role="button"]').forEach(function(c){
      c.classList.add('magnet-btn');
    });

    // Set up shared observer
    if(!window.__v15IO){
      window.__v15IO = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          if(entry.isIntersecting){
            entry.target.classList.add('in');
            window.__v15IO.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -6% 0px' });
    }
    document.querySelectorAll('.blur-in:not(.in),.slide-x:not(.in),.pop-in:not(.in),.flip-up:not(.in),.timeline-row:not(.in),.timeline-rail:not(.in)').forEach(function(el){
      window.__v15IO.observe(el);
    });
  }

  function initOrRefresh(){
    setTimeout(tagAndObserve, 50);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initOrRefresh);
  } else {
    initOrRefresh();
  }
  window.addEventListener('hashchange', function(){ setTimeout(initOrRefresh, 250); });

  /* ========= Disable curtain on initial load (and route changes) ========= */
  var curtainEl = document.getElementById('curtain');
  var curtainLabelEl = document.getElementById('curtainLabel');
  if(curtainEl){
    curtainEl.style.display = 'none';
    curtainEl.classList.remove('in','out');
  }
  if(curtainLabelEl){
    curtainLabelEl.style.display = 'none';
    curtainLabelEl.classList.remove('in');
  }



  /* v16 entrance reveal: replaces curtain bottom-to-top */
  function runEntrance(){
    if(prefersReduce) return;
    document.documentElement.classList.add('page-enter-active');
    var w = document.createElement('div');
    w.className = 'page-wash';
    document.body.appendChild(w);
    requestAnimationFrame(function(){ w.classList.add('run'); });
    setTimeout(function(){
      document.documentElement.classList.remove('page-enter-active');
      if(w && w.parentNode) w.parentNode.removeChild(w);
    }, 1100);
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', runEntrance);
  } else {
    runEntrance();
  }
})();
</script>
